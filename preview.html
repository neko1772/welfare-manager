<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>福利官预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fb;color:#222;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* Login */
.pg{display:none;justify-content:center;align-items:center;min-height:100vh;padding:20px}.pg.active{display:flex}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:320px;text-align:center}
.login-box h1{font-size:20px;margin-bottom:4px}.login-box .sub{color:#999;font-size:13px;margin-bottom:20px}
.fg{margin-bottom:14px;text-align:left}.fg label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;transition:.2s}.fg input:focus{border-color:#6366f1}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:#6366f1;color:#fff;transition:.2s}.btn:active{opacity:.8}
.err{color:#e53935;font-size:13px;margin-top:8px}

/* Main */
#mainPage{display:none}#mainPage.active{display:block}
.topbar{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:8px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.topbar .title{font-size:17px;font-weight:700;white-space:nowrap;margin-right:4px}
.topbar input{flex:1;min-width:0;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;background:#f9fafb}
.topbar input:focus{border-color:#6366f1;background:#fff}
.count{font-size:12px;color:#999;white-space:nowrap}

.list{padding:10px 12px;padding-bottom:80px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:.15s}.card:active{transform:scale(.985)}
.card .gn{font-size:16px;font-weight:700;color:#222;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card .gn .dot{width:8px;height:8px;border-radius:50%;background:#6366f1;flex-shrink:0}

.officer-line{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.officer-line .nick{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:#eef2ff;color:#6366f1}
.officer-line .name{font-size:12px;color:#888}

.info-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
.info-row .lbl{color:#aaa;font-size:11px;min-width:36px;flex-shrink:0}
.info-row .val{color:#444;word-break:break-all;font-size:12px}

.qr-thumb{border-radius:8px;width:56px;height:56px;object-fit:cover;cursor:pointer;border:1px solid #eee}

.card .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}
.btn-sm{padding:7px 13px;border:1.5px solid #d0d5dd;border-radius:8px;font-size:12px;font-weight:600;background:#fff;color:#555;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-sm:active{background:#f0f2ff;border-color:#6366f1;color:#6366f1}
.btn-sm.copy-all{background:#6366f1;color:#fff;border-color:#6366f1}
.empty{text-align:center;padding:80px 20px;color:#aaa;font-size:14px}

/* Officer detail popup (mobile) */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;justify-content:center;align-items:flex-end}
.popup-overlay.active{display:flex}
.popup-panel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:70vh;overflow-y:auto;padding:20px;box-shadow:0 -4px 20px rgba(0,0,0,.12);animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.popup-panel .phd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.popup-panel .phd span{font-size:17px;font-weight:700}
.popup-panel .phd .px{font-size:22px;color:#999;cursor:pointer;line-height:1;padding:4px}
.popup-panel .row{display:flex;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.popup-panel .row .lb{color:#999;min-width:64px;flex-shrink:0}
.popup-panel .row .vl{color:#333;user-select:text}

/* QR modal (mobile) */
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;justify-content:center;align-items:center;padding:20px}
.qr-overlay.active{display:flex}
.qr-overlay img{max-width:90vw;max-height:80vh;border-radius:12px}

/* Toast */
.tc{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ts{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#16a34a;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="pg" id="loginPage">
<div class="login-box">
  <h1>🎮 福利官预览</h1>
  <p class="sub">请输入访问密码</p>
  <div class="fg"><label>密码</label><input type="password" id="lp" placeholder="请输入密码" autocomplete="off"></div>
  <div class="err" id="le"></div>
  <button class="btn" id="loginBtn">登 录</button>
</div>
</div>

<!-- 主界面 -->
<div id="mainPage">
  <div class="topbar">
    <span class="title">🎮 福利官</span>
    <input type="text" id="searchInput" placeholder="搜索...">
    <span class="count" id="countLabel"></span>
  </div>
  <div class="list" id="cardList"></div>
  <div class="empty" id="emptyState">暂无数据</div>
</div>

<!-- 福利官详情弹出面板 -->
<div class="popup-overlay" id="officerPopup">
  <div class="popup-panel" id="officerPopupContent"></div>
</div>

<!-- 二维码放大 -->
<div class="qr-overlay" id="qrOverlay" onclick="closeQr()">
  <div style="text-align:center;color:#fff;max-width:90vw">
    <div style="font-size:18px;font-weight:700;margin-bottom:12px" id="qrTitle2">二维码预览</div>
    <img id="qrBigImg" src="" style="max-width:100%;border-radius:12px">
  </div>
</div>

<!-- Toast -->
<div class="tc" id="toastContainer"></div>

<script>
var $ = function(id){ return document.getElementById(id) };
var esc = function(s){ if(!s)return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML };

function toast(msg){
  var c = $('toastContainer');
  var d = document.createElement('div');
  d.className = 'ts';
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(function(){ d.style.opacity='0'; d.style.transition='opacity .3s'; setTimeout(function(){c.removeChild(d)},300) },1800);
}

function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){ toast('已复制') });
  } else {
    var ta = document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('已复制');
  }
}

/* Storage */
var PWD_KEY = 'gw_pwd';
var DATA_KEY = 'gw_data';
var OFFICER_KEY = 'gw_officers';
var SESSION_KEY = 'gw_session';
var SESSION_HOURS = 4;

/* Simple hash - same as main */
function simpleHash(str){
  var hash=0;
  for(var i=0;i<str.length;i++){ var c=str.charCodeAt(i); hash=((hash<<5)-hash)+c; hash=hash&hash }
  var h=Math.abs(hash).toString(36);
  var salt='gw_salt_2026';
  var combined=h+salt+h.split('').reverse().join('');
  var hash2=0;
  for(var j=0;j<combined.length;j++){ hash2=((hash2<<5)-hash2)+combined.charCodeAt(j); hash2=hash2&hash2 }
  return 'v2:'+Math.abs(hash2).toString(36)+'_'+Math.abs(hash+hash2).toString(36);
}

function hasSession(){
  var s=localStorage.getItem(SESSION_KEY);
  if(!s)return false;
  try{ var d=JSON.parse(s); if(d.expiry>Date.now())return true }catch(e){}
  localStorage.removeItem(SESSION_KEY);
  return false;
}
function pwdNotSet(){
  return !localStorage.getItem(PWD_KEY);
}

function getData(){
  try{ return JSON.parse(localStorage.getItem(DATA_KEY))||[] }catch(e){ return [] }
}
function getOfficers(){
  try{ return JSON.parse(localStorage.getItem(OFFICER_KEY))||[] }catch(e){ return [] }
}

/* Login */
var PREVIEW_PWD = '12123';

$('loginBtn').addEventListener('click', function(){
  var pwd=$('lp').value, err=$('le');
  if(!pwd){err.textContent='请输入密码';return}
  
  var ok=false;
  if(pwd===PREVIEW_PWD) ok=true;
  else {
    var stored=localStorage.getItem(PWD_KEY);
    if(stored && simpleHash(pwd)===stored) ok=true;
  }
  if(!ok){err.textContent='密码错误';return;}
  
  var token='';
  for(var i=0;i<32;i++)token+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];
  localStorage.setItem(SESSION_KEY,JSON.stringify({token:token,expiry:Date.now()+SESSION_HOURS*3600000}));
  $('loginPage').classList.remove('active');
  $('mainPage').classList.add('active');
  render();
});
$('lp').addEventListener('keydown',function(e){if(e.key==='Enter')$('loginBtn').click()});

/* Render cards */
function render(){
  var games=getData();
  var kw=($('searchInput').value||'').trim().toLowerCase();
  if(kw){
    games=games.filter(function(g){
      if((g.game_name||'').toLowerCase().indexOf(kw)>=0)return true;
      var offs=getOfficers();
      var sel=(g.officer_ids||[]).map(function(oid){var o=offs.find(function(x){return x.id===oid});return o?(o.nick+' '+o.name):''}).join(' ');
      return sel.toLowerCase().indexOf(kw)>=0;
    });
  }
  $('countLabel').textContent=games.length+'条';
  var list=$('cardList');
  if(games.length===0){$('emptyState').style.display='block';list.innerHTML='';return}
  $('emptyState').style.display='none';
  var offs=getOfficers();
  var html='';
  for(var i=0;i<games.length;i++){
    var g=games[i];
    var sel=(g.officer_ids||[]).map(function(oid){return offs.find(function(x){return x.id===oid})}).filter(Boolean);
    var qrUrl=g.qr_url||'';
    var link=g.customer_link||'';
    var params=g.link_params||'';
    var fullLink=link+params;

    html+='<div class="card">';
    html+='<div class="gn"><span class="dot"></span>'+esc(g.game_name)+'</div>';

    // Officer info
    var seenNames={};
    for(var j=0;j<sel.length;j++){
      var o=sel[j];
      html+='<div class="officer-line" style="cursor:pointer" onclick="showOfficer(\''+o.id+'\')">';
      html+='<span class="nick">'+esc(o.nick)+'</span>';
      if(o.name && !seenNames[o.name]){ seenNames[o.name]=true; html+='<span class="name">'+esc(o.name)+'</span>'; }
      html+='</div>';
    }

    // Links
    if(link) html+='<div class="info-row"><span class="lbl">链接</span><span class="val">'+esc(link)+'</span></div>';
    if(params) html+='<div class="info-row"><span class="lbl">参数</span><span class="val">'+esc(params)+'</span></div>';
    if(g.notes) html+='<div class="info-row"><span class="lbl">备注</span><span class="val">'+esc(g.notes)+'</span></div>';

    // QR
    if(qrUrl) html+='<div style="margin:8px 0"><img class="qr-thumb" src="'+esc(qrUrl)+'" onclick="event.stopPropagation();showQr(\''+esc(qrUrl)+'\',\''+esc(g.game_name)+'\')"></div>';

    // Actions
    html+='<div class="actions">';
    if(link) html+='<button class="btn-sm" onclick="event.stopPropagation();copyText(\''+esc(link)+'\')">🔗 链接</button>';
    if(params) html+='<button class="btn-sm" onclick="event.stopPropagation();copyText(\''+esc(params)+'\')">🔗 参数</button>';
    if(fullLink) html+='<button class="btn-sm" onclick="event.stopPropagation();copyText(\''+esc(fullLink)+'\')">🔗 完整</button>';
    if(qrUrl) html+='<button class="btn-sm" onclick="event.stopPropagation();copyText(\''+esc(qrUrl)+'\')">🖼 二维码</button>';
    html+='<button class="btn-sm" onclick="event.stopPropagation();copyCard(\''+g.id+'\')">📄 全文</button>';
    html+='</div>';

    html+='</div>';
  }
  list.innerHTML=html;
}

function copyCard(id){
  var games=getData();
  var g=null;
  for(var i=0;i<games.length;i++){if(games[i].id===id){g=games[i];break}}
  if(!g)return;
  var offs=getOfficers();
  var sel=(g.officer_ids||[]).map(function(oid){return offs.find(function(x){return x.id===oid})}).filter(Boolean);
  var lines=[];
  lines.push('游戏名称：'+(g.game_name||''));
  if(sel.length){
    lines.push('福利官昵称：'+sel.map(function(o){return o.nick}).join('、'));
    lines.push('福利官名称：'+sel.map(function(o){return o.name||'—'}).join('、'));
  }
  if(g.customer_link)lines.push('获客链接：'+g.customer_link);
  if(g.link_params)lines.push('链接参数：'+g.link_params);
  if(g.qr_url)lines.push('二维码：'+g.qr_url);
  if(g.notes)lines.push('备注：'+g.notes);
  copyText(lines.join('\n'));
}

function showOfficer(oid){
  var offs=getOfficers(),o=null;
  for(var i=0;i<offs.length;i++){if(offs[i].id===oid){o=offs[i];break}}
  if(!o)return;
  var html='<div class="phd"><span>'+(o.seq?'['+esc(o.seq)+'] ':'')+esc(o.nick)+'</span><span class="px" onclick="$(\'officerPopup\').classList.remove(\'active\')">×</span></div>';
  if(o.seq)html+='<div class="row"><span class="lb">项目序列</span><span class="vl">'+esc(o.seq)+'</span></div>';
  html+='<div class="row"><span class="lb">昵称</span><span class="vl">'+esc(o.nick)+'</span></div>';
  if(o.name)html+='<div class="row"><span class="lb">名称</span><span class="vl">'+esc(o.name)+'</span></div>';
  if(o.phone)html+='<div class="row"><span class="lb">手机</span><span class="vl">'+esc(o.phone)+'</span></div>';
  if(o.wechat)html+='<div class="row"><span class="lb">微信</span><span class="vl">'+esc(o.wechat)+'</span></div>';
  if(o.realName)html+='<div class="row"><span class="lb">实名</span><span class="vl">'+esc(o.realName)+'</span></div>';
  if(o.qiyu)html+='<div class="row"><span class="lb">七鱼</span><span class="vl">'+esc(o.qiyu)+'</span></div>';
  if(o.device)html+='<div class="row"><span class="lb">设备</span><span class="vl">'+esc(o.device)+'</span></div>';
  $('officerPopupContent').innerHTML=html;
  $('officerPopup').classList.add('active');
}
$('officerPopup').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('active');
});

function showQr(url,gameName){
  $('qrBigImg').src=url;
  $('qrTitle2').textContent=(gameName?gameName+' — ':'')+'二维码预览';
  $('qrOverlay').classList.add('active');
}
function closeQr(){ $('qrOverlay').classList.remove('active') }

$('searchInput').addEventListener('input',function(){render()});

/* Init */
if(hasSession() || pwdNotSet()){ $('loginPage').classList.remove('active'); $('mainPage').classList.add('active'); render(); }
else { $('loginPage').classList.add('active') }
</script>
</body>
</html>
